<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .sset { display:grid; grid-template-columns: repeat(4, 1fr); gap:14px; }
  .stile { aspect-ratio: 1/0.9; background: var(--soft-cloud); border-radius: 16px; display:flex; align-items:flex-end; justify-content:center; padding: 10px; font-size: 11px; color: var(--fg-muted); text-transform: lowercase; }
</style></head>
<body><div class="card">
  <div class="type-eyebrow">shadow system · tinted plum grove</div>
  <div class="sset">
    <div class="stile" style="box-shadow: var(--shadow-sm);">sm</div>
    <div class="stile" style="box-shadow: var(--shadow-md);">md</div>
    <div class="stile" style="box-shadow: var(--shadow-lg);">lg</div>
    <div class="stile" style="box-shadow: var(--shadow-xl);">xl</div>
  </div>
</div></body></html>
