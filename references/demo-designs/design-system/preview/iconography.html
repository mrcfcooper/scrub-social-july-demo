<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/lucide@0.453.0/dist/umd/lucide.min.js"></script>
<style>
  .icons { display:grid; grid-template-columns: repeat(8, 1fr); gap: 14px; }
  .ic { display:flex; flex-direction:column; align-items:center; gap:4px; font-size:10px; color:var(--fg-muted); text-transform:lowercase; }
  .ic svg { width: 24px; height: 24px; color: var(--plum-grove); stroke-width: 1.75; }
</style></head>
<body><div class="card">
  <div class="type-eyebrow">lucide · stroke 1.75 · rounded</div>
  <div class="icons" id="icons"></div>
  <script>
    const set = ['heart','home','briefcase','map-pin','users','compass','book-open','message-circle','bookmark','calendar','search','bell','user','settings','plane','sparkles'];
    const root = document.getElementById('icons');
    set.forEach(n => {
      const div = document.createElement('div'); div.className='ic';
      div.innerHTML = `<i data-lucide="${n}"></i><span>${n}</span>`;
      root.appendChild(div);
    });
    lucide.createIcons();
  </script>
</div></body></html>
