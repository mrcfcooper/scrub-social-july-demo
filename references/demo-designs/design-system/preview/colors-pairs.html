<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .pair { display:grid; grid-template-columns: 96px 1fr; gap: 16px; align-items:center; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .pair:last-child { border-bottom: 0; }
  .chip { height: 44px; border-radius: 10px; border: 1px solid rgba(66,26,49,0.08); display:flex; align-items:center; justify-content:center; font-size: 11px; }
  .lbl { font-size: 14px; }
  .lbl b { font-weight: 500; }
  .meta { font-size: 12px; color: var(--fg-muted); text-transform: lowercase; }
</style></head>
<body><div class="card">
  <div class="pair">
    <div class="chip" style="background:#F9F2E8; color:#421A31;">Dew · Plum</div>
    <div class="lbl"><b>Page background + body text</b><div class="meta">default combo — aa pass at 16px+</div></div>
  </div>
  <div class="pair">
    <div class="chip" style="background:#421A31; color:#F9F2E8;">Plum · Dew</div>
    <div class="lbl"><b>Inverted / footer / hero</b><div class="meta">aaa for all sizes</div></div>
  </div>
  <div class="pair">
    <div class="chip" style="background:#CEDBFE; color:#421A31;">Sky · Plum</div>
    <div class="lbl"><b>Soft section fill</b><div class="meta">aa pass — chips, callouts</div></div>
  </div>
  <div class="pair">
    <div class="chip" style="background:#BBAFEF; color:#421A31;">Lavender · Plum</div>
    <div class="lbl"><b>Decorative block + heading</b><div class="meta">aa pass at 18px+</div></div>
  </div>
</div></body></html>
