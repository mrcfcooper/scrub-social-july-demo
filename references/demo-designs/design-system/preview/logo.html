<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .wrap { display:flex; gap: 24px; align-items:center; }
  .wm { width: 180px; }
  .logos { display:flex; flex-direction: column; gap: 10px; }
  .fav { display:flex; align-items:center; gap:10px; font-size:12px; color:var(--fg-muted); }
  .fav img { width: 36px; height: 36px; }
</style></head>
<body><div class="card">
  <div class="wrap">
    <img class="wm" src="../assets/logo/wordmark.svg" alt="Scrub Society wordmark" />
    <div class="logos">
      <img src="../assets/logo/wordmark-inline.svg" alt="Scrub Society inline" style="width: 260px;" />
      <div class="fav">
        <img src="../assets/logo/favicon.svg" alt="" />
        <span style="text-transform:lowercase;">favicon · app icon · 1024→16</span>
      </div>
    </div>
  </div>
  <div style="font-size:11px; color:var(--fg-muted); text-transform:lowercase;">⚠ placeholder — please drop in the official vector</div>
</div></body></html>
