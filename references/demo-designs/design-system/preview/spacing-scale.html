<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row2 { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; }
  .tile { background: var(--plum-grove-10, #EBE3E8); border-radius: 10px; display:flex; align-items:center; justify-content:center; color:var(--fg); font-size:10px; font-variant-numeric: tabular-nums; }
</style></head>
<body><div class="card">
  <div class="type-eyebrow">spacing scale · 8pt base</div>
  <div class="row2">
    <div class="tile" style="width:4px; height:32px;"></div>
    <div class="tile" style="width:8px; height:32px;"></div>
    <div class="tile" style="width:12px; height:32px;"></div>
    <div class="tile" style="width:16px; height:32px;">16</div>
    <div class="tile" style="width:24px; height:32px;">24</div>
    <div class="tile" style="width:32px; height:32px;">32</div>
    <div class="tile" style="width:48px; height:32px;">48</div>
    <div class="tile" style="width:64px; height:32px;">64</div>
    <div class="tile" style="width:96px; height:32px;">96</div>
    <div class="tile" style="width:128px; height:32px;">128</div>
  </div>
  <div style="font-size:11px; color:var(--fg-muted); text-transform:lowercase;">tokens: --s-1 4 · --s-2 8 · --s-3 12 · --s-4 16 · --s-5 24 · --s-6 32 · --s-7 48 · --s-8 64 · --s-9 96 · --s-10 128</div>
</div></body></html>
