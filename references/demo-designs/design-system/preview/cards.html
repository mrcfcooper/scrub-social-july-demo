<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .cards { display:grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .c { background: var(--soft-cloud); border-radius: 20px; padding: 18px; box-shadow: var(--shadow-md); display: flex; flex-direction: column; gap: 8px; }
  .c .eye { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-muted); }
  .c h3 { font-weight: 400; font-size: 20px; letter-spacing: -0.03em; line-height: 1.15; color: var(--fg); margin: 0; }
  .c p { font-weight: 300; font-size: 13px; line-height: 1.5; color: var(--fg-muted); margin: 0; }
  .c.accent { background: var(--lavender-field); }
  .c.accent .eye { color: var(--plum-grove); opacity: 0.6; }
</style></head>
<body><div class="card">
  <div class="cards">
    <div class="c">
      <div class="eye">SPOTLIGHT</div>
      <h3>Your way and the highway.</h3>
      <p>Kevin has worked in 14 states in three years. Here's what he packs.</p>
    </div>
    <div class="c accent">
      <div class="eye">RESOURCES</div>
      <h3>5 must-know tips for evaluating a job offer.</h3>
      <p>Because we've been there..</p>
    </div>
  </div>
</div></body></html>
