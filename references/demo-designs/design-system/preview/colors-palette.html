<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="grid" style="grid-template-columns: repeat(3, 1fr);">
    <div class="swatch" style="background:#F9F2E8; color:#421A31;">
      <div class="name">Morning Dew</div>
      <div class="hex">#F9F2E8 · page bg</div>
    </div>
    <div class="swatch" style="background:#FFFFFF; color:#421A31;">
      <div class="name">Soft Cloud</div>
      <div class="hex">#FFFFFF · cards</div>
    </div>
    <div class="swatch" style="background:#421A31; color:#F9F2E8; border-color:transparent;">
      <div class="name">Plum Grove</div>
      <div class="hex">#421A31 · ink</div>
    </div>
    <div class="swatch" style="background:#CEDBFE; color:#421A31;">
      <div class="name">Clear Sky</div>
      <div class="hex">#CEDBFE · tint</div>
    </div>
    <div class="swatch" style="background:#82ABF4; color:#421A31;">
      <div class="name">Open Air</div>
      <div class="hex">#82ABF4 · accent</div>
    </div>
    <div class="swatch" style="background:#BBAFEF; color:#421A31;">
      <div class="name">Lavender Field</div>
      <div class="hex">#BBAFEF · accent</div>
    </div>
  </div>
</div></body></html>
