<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .quotes { display:flex; flex-direction: column; gap: 10px; }
  .q { font-weight: 400; font-size: 22px; letter-spacing: -0.03em; line-height: 1.15; color: var(--fg); }
  .q .tag { font-size: 12px; font-weight: 400; color: var(--fg-muted); text-transform: lowercase; letter-spacing: 0; margin-left: 10px; }
</style></head>
<body><div class="card">
  <div class="quotes">
    <div class="q">Belong everywhere. <span class="tag">· headline</span></div>
    <div class="q">Flourish in your field. <span class="tag">· hero</span></div>
    <div class="q">Better together. <span class="tag">· tagline</span></div>
    <div class="q">You're in good company. <span class="tag">· cta</span></div>
    <div class="q">Because we've been there.. <span class="tag">· callout</span></div>
  </div>
</div></body></html>
