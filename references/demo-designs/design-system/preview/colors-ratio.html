<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .bar { display:flex; height:72px; border-radius: 14px; overflow:hidden; box-shadow: var(--shadow-sm); }
  .seg { display:flex; align-items:flex-end; padding:10px 12px; color:#421A31; font-size:11px; font-weight:500; }
  .seg.dark { color:#F9F2E8; }
  .legend { display:flex; flex-wrap:wrap; gap: 6px 14px; font-size:12px; color: var(--fg-muted); }
  .dot { width:10px; height:10px; border-radius:999px; display:inline-block; margin-right:6px; vertical-align:middle; border:1px solid rgba(66,26,49,0.1); }
</style></head>
<body><div class="card">
  <div class="type-eyebrow" style="letter-spacing:0.12em;">palette ratio · brand deck pg. 27</div>
  <div class="bar">
    <div class="seg dark" style="background:#421A31; flex:40;">40%</div>
    <div class="seg" style="background:#FFFFFF; flex:20;">20%</div>
    <div class="seg" style="background:#F9F2E8; flex:15;">15%</div>
    <div class="seg" style="background:#CEDBFE; flex:10;">10%</div>
    <div class="seg" style="background:#BBAFEF; flex:10;">10%</div>
    <div class="seg" style="background:#82ABF4; flex:5;">5%</div>
  </div>
  <div class="legend">
    <span><span class="dot" style="background:#421A31"></span>Plum Grove 40%</span>
    <span><span class="dot" style="background:#FFFFFF"></span>Soft Cloud 20%</span>
    <span><span class="dot" style="background:#F9F2E8"></span>Morning Dew 15%</span>
    <span><span class="dot" style="background:#CEDBFE"></span>Clear Sky 10%</span>
    <span><span class="dot" style="background:#BBAFEF"></span>Lavender Field 10%</span>
    <span><span class="dot" style="background:#82ABF4"></span>Open Air 5%</span>
  </div>
</div></body></html>
