<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .rset { display:flex; gap:14px; align-items:flex-end; flex-wrap:wrap; }
  .rtile { width:90px; height:90px; background: var(--soft-cloud); border: 1px solid var(--border); display:flex; align-items:flex-end; justify-content:center; padding: 8px; box-shadow: var(--shadow-sm); font-size:11px; color: var(--fg-muted); text-transform: lowercase; }
</style></head>
<body><div class="card">
  <div class="type-eyebrow">corner radii</div>
  <div class="rset">
    <div class="rtile" style="border-radius:4px;">xs · 4</div>
    <div class="rtile" style="border-radius:8px;">sm · 8</div>
    <div class="rtile" style="border-radius:12px;">md · 12</div>
    <div class="rtile" style="border-radius:20px;">lg · 20</div>
    <div class="rtile" style="border-radius:28px;">xl · 28</div>
    <div class="rtile" style="border-radius:40px;">2xl · 40</div>
    <div class="rtile" style="border-radius:999px;">full</div>
  </div>
</div></body></html>
