<style>/* ============================================================
   Scrub Society — Design Tokens
   Source of truth: ScrubSociety_BrandStandards.pdf (Spring 2026)
   Usage: import once in your HTML/CSS root.
   ============================================================ */

@font-face {
  font-family: "Outfit";
  src: url("/demo/assets/preference-center-29173a63.bin") format("truetype-variations"),
       url("/demo/assets/preference-center-29173a63.bin") format("truetype");
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}

:root {
  /* ---------------- BRAND COLOR — primary palette ---------------- */
  /* Plum Grove — dominant background and hero color (40% of color use). */
  --ss-plum-grove: #421A31;
  /* Open Air — paper white (20% of color use). */
  --ss-open-air: #FFFFFF;
  /* Lavender Field — accent (15% of color use). */
  --ss-lavender-field: #BBAFEF;

  /* ---------------- BRAND COLOR — secondary palette ---------------- */
  /* Backgrounds and buttons only. Never combined with Open Air in duotone — Soft Cloud + Open Air are the ONLY duotone pair. */
  --ss-clear-sky:    #82ABF4;
  --ss-morning-dew:  #CEDBFE;
  --ss-soft-cloud:   #F9F2E8;

  /* ---------------- DERIVED color states ---------------- */
  /* All derived states use color-mix on the canonical brand values; no new hues invented. */
  --ss-plum-grove-90: color-mix(in srgb, var(--ss-plum-grove) 90%, black);   /* press */
  --ss-plum-grove-80: color-mix(in srgb, var(--ss-plum-grove) 80%, white);   /* hover-on-light surface */
  --ss-plum-grove-60: color-mix(in srgb, var(--ss-plum-grove) 60%, white);
  --ss-plum-grove-40: color-mix(in srgb, var(--ss-plum-grove) 40%, white);
  --ss-plum-grove-20: color-mix(in srgb, var(--ss-plum-grove) 20%, white);   /* hairline tint */
  --ss-plum-grove-08: color-mix(in srgb, var(--ss-plum-grove) 8%,  white);   /* faintest fill */

  --ss-lavender-field-60: color-mix(in srgb, var(--ss-lavender-field) 60%, white);
  --ss-lavender-field-30: color-mix(in srgb, var(--ss-lavender-field) 30%, white);
  --ss-clear-sky-30:      color-mix(in srgb, var(--ss-clear-sky)      30%, white);
  --ss-morning-dew-50:    color-mix(in srgb, var(--ss-morning-dew)    50%, white);

  /* ---------------- SEMANTIC color tokens ---------------- */
  /* Surfaces */
  --ss-bg-page:     var(--ss-open-air);
  --ss-bg-canvas:   var(--ss-soft-cloud);       /* warm paper, sparing — 5% */
  --ss-bg-hero:     var(--ss-plum-grove);       /* dominant dark hero */
  --ss-bg-card:     var(--ss-open-air);
  --ss-bg-card-alt: var(--ss-soft-cloud);
  --ss-bg-tint:     var(--ss-morning-dew);      /* soft secondary fill */
  --ss-bg-accent:   var(--ss-lavender-field);   /* accent fill */
  --ss-bg-info:     var(--ss-clear-sky);

  /* Text — on light */
  --ss-fg-1: var(--ss-plum-grove);                              /* primary body + heading */
  --ss-fg-2: color-mix(in srgb, var(--ss-plum-grove) 72%, var(--ss-open-air));  /* muted */
  --ss-fg-3: color-mix(in srgb, var(--ss-plum-grove) 50%, var(--ss-open-air));  /* very muted, captions */
  --ss-fg-on-dark:        var(--ss-open-air);
  --ss-fg-on-dark-muted:  color-mix(in srgb, var(--ss-open-air) 75%, var(--ss-plum-grove));

  /* Lines & dividers */
  --ss-line:       color-mix(in srgb, var(--ss-plum-grove) 12%, var(--ss-open-air));
  --ss-line-soft:  color-mix(in srgb, var(--ss-plum-grove)  8%, var(--ss-open-air));
  --ss-line-on-dark: color-mix(in srgb, var(--ss-open-air) 18%, transparent);

  /* Interaction */
  --ss-focus-ring: color-mix(in srgb, var(--ss-lavender-field) 60%, transparent);

  /* ---------------- TYPOGRAPHY — family + weights ---------------- */
  /* Only one typeface, two weights. */
  --ss-font: "Outfit", "Helvetica Neue", Arial, sans-serif;
  --ss-weight-light:   300;   /* body copy */
  --ss-weight-regular: 400;   /* headlines, subheads, subtext */

  /* ---------------- TYPOGRAPHY — scale ---------------- */
  /* Mobile-first sizes; the type roles below define the role-to-step mapping. */
  --ss-step-1:  0.75rem;    /* 12 */
  --ss-step-2:  0.875rem;   /* 14 */
  --ss-step-3:  1rem;       /* 16 */
  --ss-step-4:  1.125rem;   /* 18 */
  --ss-step-5:  1.375rem;   /* 22 */
  --ss-step-6:  1.75rem;    /* 28 */
  --ss-step-7:  2.25rem;    /* 36 */
  --ss-step-8:  3rem;       /* 48 */
  --ss-step-9:  4rem;       /* 64 */
  --ss-step-10: 5.5rem;     /* 88 — hero display */

  /* ---------------- SPACING ---------------- */
  --ss-space-1:  4px;
  --ss-space-2:  8px;
  --ss-space-3:  12px;
  --ss-space-4:  16px;
  --ss-space-5:  24px;
  --ss-space-6:  32px;
  --ss-space-7:  48px;
  --ss-space-8:  64px;
  --ss-space-9:  96px;
  --ss-space-10: 128px;

  /* ---------------- RADII ---------------- */
  /* Speech-bubble inspired: pill + photo-frame asymmetric pill (square bottom-left). */
  --ss-radius-1:  6px;
  --ss-radius-2:  12px;     /* default card */
  --ss-radius-3:  20px;     /* large card */
  --ss-radius-4:  32px;     /* hero element */
  --ss-radius-pill:    9999px;
  --ss-radius-photo:   28px 28px 28px 0;   /* speech-bubble photo frame */
  --ss-radius-bubble:  9999px 9999px 9999px 0; /* full bubble — used for the S mark + chat tails */

  /* ---------------- SHADOWS ---------------- */
  /* Subtle; the brand is paper-flat, not glossy. */
  --ss-shadow-1: 0 1px 2px color-mix(in srgb, var(--ss-plum-grove) 12%, transparent);
  --ss-shadow-2: 0 6px 16px -8px color-mix(in srgb, var(--ss-plum-grove) 22%, transparent);
  --ss-shadow-3: 0 18px 36px -16px color-mix(in srgb, var(--ss-plum-grove) 28%, transparent);
  --ss-shadow-inset-hairline: inset 0 0 0 1px var(--ss-line);

  /* ---------------- MOTION ---------------- */
  --ss-ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
  --ss-ease-out:      cubic-bezier(0, 0, 0.2, 1);
  --ss-dur-fast: 120ms;
  --ss-dur-base: 220ms;
  --ss-dur-slow: 400ms;
}

/* ---------------- ROLE-TO-STYLE — these are the canonical type roles. ----------------
   Per brand standards (page 29):
   - HEADLINE:  Outfit Regular,  tracking -40pt (≈ -0.04em), sentence case
   - SUBHEAD:   Outfit Regular,  tracking  0pt,  ALL CAPS
   - BODY COPY: Outfit Light,    tracking  0pt,  sentence case
   - SUBTEXT:   Outfit Regular,  tracking  0pt,  lower case
*/
.ss-headline,
.ss-h1, .ss-h2, .ss-h3, .ss-h4 {
  font-family: var(--ss-font);
  font-weight: var(--ss-weight-regular);
  letter-spacing: -0.04em;        /* -40pt tracking */
  line-height: 1.04;
  text-transform: none;           /* sentence case */
  text-wrap: balance;
  color: var(--ss-fg-1);
  margin: 0;
}
.ss-h1 { font-size: clamp(2.5rem, 6vw + 0.5rem, var(--ss-step-10)); }
.ss-h2 { font-size: clamp(2rem,   4vw + 0.5rem, var(--ss-step-8));  }
.ss-h3 { font-size: clamp(1.5rem, 2.5vw + 0.5rem, var(--ss-step-7)); }
.ss-h4 { font-size: clamp(1.25rem, 1.5vw + 0.5rem, var(--ss-step-6)); line-height: 1.15; }

.ss-subhead {
  font-family: var(--ss-font);
  font-weight: var(--ss-weight-regular);
  letter-spacing: 0.08em;
  line-height: 1.2;
  text-transform: uppercase;
  font-size: var(--ss-step-2);
  color: var(--ss-fg-2);
  margin: 0;
}

.ss-body, p.ss-body {
  font-family: var(--ss-font);
  font-weight: var(--ss-weight-light);    /* light = the body weight */
  letter-spacing: 0;
  line-height: 1.55;
  font-size: var(--ss-step-3);
  color: var(--ss-fg-1);
  text-wrap: pretty;
  margin: 0;
}
.ss-body-sm { font-size: var(--ss-step-2); line-height: 1.5; }
.ss-body-lg { font-size: var(--ss-step-4); line-height: 1.55; }

.ss-subtext {
  font-family: var(--ss-font);
  font-weight: var(--ss-weight-regular);
  letter-spacing: 0;
  line-height: 1.4;
  text-transform: lowercase;              /* lower case per spec */
  font-size: var(--ss-step-2);
  color: var(--ss-fg-2);
  margin: 0;
}

/* On-dark variants */
.ss-on-dark { color: var(--ss-fg-on-dark); }
.ss-on-dark .ss-body, .ss-on-dark .ss-headline,
.ss-on-dark .ss-h1, .ss-on-dark .ss-h2, .ss-on-dark .ss-h3, .ss-on-dark .ss-h4 { color: var(--ss-fg-on-dark); }
.ss-on-dark .ss-subhead, .ss-on-dark .ss-subtext { color: var(--ss-fg-on-dark-muted); }

/* Reset helpers */
html, body { background: var(--ss-bg-page); color: var(--ss-fg-1); font-family: var(--ss-font); }
*, *::before, *::after { box-sizing: border-box; }
</style>

  --ss-line-soft:  color-mix(in srgb, var(--ss-plum-grove)  8%, var(--ss-open-air));

  /* Interaction */
  --ss-focus-ring: color-mix(in srgb, var(--ss-lavender-field) 60%, transparent);

  /* ---------------- TYPOGRAPHY — family + weights ---------------- */
  /* Only one typeface, two weights. */
  --ss-font: "Outfit", "Helvetica Neue", Arial, sans-serif;
  --ss-weight-light:   300;   /* body copy */
  --ss-weight-regular: 400;   /* headlines, subheads, subtext */

  /* ---------------- TYPOGRAPHY — scale ---------------- */
  /* Mobile-first sizes; the type roles below define the role-to-step mapping. */
  --ss-step-1:  0.75rem;    /* 12 */
  --ss-step-2:  0.875rem;   /* 14 */
  --ss-step-3:  1rem;       /* 16 */
  --ss-step-4:  1.125rem;   /* 18 */
  --ss-step-5:  1.375rem;   /* 22 */
  --ss-step-6:  1.75rem;    /* 28 */
  --ss-step-7:  2.25rem;    /* 36 */
  --ss-step-8:  3rem;       /* 48 */
  --ss-step-9:  4rem;       /* 64 */
  --ss-step-10: 5.5rem;     /* 88 — hero display */

  /* ---------------- SPACING ---------------- */
  --ss-space-1:  4px;
  --ss-space-2:  8px;
  --ss-space-3:  12px;
  --ss-space-4:  16px;
  --ss-space-5:  24px;
  --ss-space-6:  32px;
  --ss-space-7:  48px;
  --ss-space-8:  64px;
  --ss-space-9:  96px;
  --ss-space-10: 128px;

  /* ---------------- RADII ---------------- */
  /* Speech-bubble inspired: pill + photo-frame asymmetric pill (square bottom-left). */
  --ss-radius-1:  6px;
  --ss-radius-2:  12px;     /* default card */
  --ss-radius-3:  20px;     /* large card */
  --ss-radius-4:  32px;     /* hero element */
  --ss-radius-pill:    9999px;
  --ss-radius-photo:   28px 28px 28px 0;   /* speech-bubble photo frame */
  --ss-radius-bubble:  9999px 9999px 9999px 0; /* full bubble — used for the S mark + chat tails */

  /* ---------------- SHADOWS ---------------- */
  /* Subtle; the brand is paper-flat, not glossy. */
  --ss-shadow-1: 0 1px 2px color-mix(in srgb, var(--ss-plum-grove) 12%, transparent);
  --ss-shadow-2: 0 6px 16px -8px color-mix(in srgb, var(--ss-plum-grove) 22%, transparent);
  --ss-shadow-3: 0 18px 36px -16px color-mix(in srgb, var(--ss-plum-grove) 28%, transparent);
  --ss-shadow-inset-hairline: inset 0 0 0 1px var(--ss-line);

  --ss-ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
  --ss-ease-out:      cubic-bezier(0, 0, 0.2, 1);
  --ss-dur-fast: 120ms;
  --ss-dur-base: 220ms;
  --ss-dur-slow: 400ms;
}

/* ---------------- ROLE-TO-STYLE — these are the canonical type roles. ----------------
   Per brand standards (page 29):
   - HEADLINE:  Outfit Regular,  tracking -40pt (≈ -0.04em), sentence case
   - SUBHEAD:   Outfit Regular,  tracking  0pt,  ALL CAPS
   - BODY COPY: Outfit Light,    tracking  0pt,  sentence case
   - SUBTEXT:   Outfit Regular,  tracking  0pt,  lower case
*/
.ss-headline,
.ss-h1, .ss-h2, .ss-h3, .ss-h4 {
  font-family: var(--ss-font);
  font-weight: var(--ss-weight-regular);
  letter-spacing: -0.04em;        /* -40pt tracking */
  line-height: 1.04;
  text-transform: none;           /* sentence case */
  text-wrap: balance;
  color: var(--ss-fg-1);
  margin: 0;
}
.ss-h1 { font-size: clamp(2.5rem, 6vw + 0.5rem, var(--ss-step-10)); }
.ss-h2 { font-size: clamp(2rem,   4vw + 0.5rem, var(--ss-step-8));  }

.ss-h4 { font-size: clamp(1.25rem, 1.5vw + 0.5rem, var(--ss-step-6)); line-height: 1.15; }

.ss-subhead {

  font-weight: var(--ss-weight-regular);
  letter-spacing: 0.08em;

}

.ss-body-lg { font-size: var(--ss-step-4); line-height: 1.55; }

.ss-subtext {
  font-family: var(--ss-font);
  font-weight: var(--ss-weight-regular);
  letter-spacing: 0;
  line-height: 1.4;
  text-transform: lowercase;              /* lower case per spec */
  font-size: var(--ss-step-2);
  color: var(--ss-fg-2);
  margin: 0;
}

/* On-dark variants */
.ss-on-dark { color: var(--ss-fg-on-dark); }
.ss-on-dark .ss-body, .ss-on-dark .ss-headline,
.ss-on-dark .ss-h1, .ss-on-dark .ss-h2, .ss-on-dark .ss-h3, .ss-on-dark .ss-h4 { color: var(--ss-fg-on-dark); }
.ss-on-dark .ss-subhead, .ss-on-dark .ss-subtext { color: var(--ss-fg-on-dark-muted); }

/* Reset helpers */
html, body { background: var(--ss-bg-page); color: var(--ss-fg-1); font-family: var(--ss-font); }
*, *::before, *::after { box-sizing: border-box; }

<script type="text/babel">
const { useState } = React;
const { SS, SMark, Card, Chip, Subhead, PrefScreen, buildInitialState } = window;

/* -------- design-notes / flags panel -------- */
function Flag({ kind, title, children }) {
  const tones = {
    build: { bg: 'color-mix(in srgb, var(--ss-lavender-field) 22%, white)', dot: 'var(--ss-lavender-field)', label: 'built net-new' },
    watch: { bg: 'color-mix(in srgb, var(--ss-clear-sky) 18%, white)', dot: 'var(--ss-clear-sky)', label: 'watch' },
    ok:    { bg: 'var(--ss-soft-cloud)', dot: 'color-mix(in srgb, var(--ss-plum-grove) 40%, white)', label: 'on-system' },
  }[kind];
  return (
    <div style={{ background: tones.bg, borderRadius: 'var(--ss-radius-2)', padding: '16px 18px', boxShadow: 'inset 0 0 0 1px var(--ss-line)' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 7 }}>
        <span style={{ width: 9, height: 9, borderRadius: '50%', background: tones.dot, flex: '0 0 auto' }} />
        <span className="ss-subhead" style={{ fontSize: 10.5 }}>{tones.label}</span>
      </div>
      <div style={{ fontFamily: 'var(--ss-font)', fontWeight: 400, fontSize: 15, color: 'var(--ss-fg-1)', marginBottom: 4 }}>{title}</div>
      <p className="ss-body ss-body-sm" style={{ color: 'var(--ss-fg-2)' }}>{children}</p>
    </div>
  );
}

function DesignNotes() {
  return (
    <div className="notes">
      <Subhead style={{ display: 'block', marginBottom: 14 }}>Design notes — where the brief meets the primitives</Subhead>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: 16 }}>
        <Flag kind="build" title="Toggle, frequency select & consent checkbox">
          The bundle ships type, buttons, Card, Chip (the badge), Icon, SMark and PhotoFrame — but no selection-control
          toggle, no form select, and no checkbox. All three are built here directly on the tokens
          (Plum-Grove-on track, hairline rests, color-change press), styled to read as one family.
          Strong candidates to promote into the system.
        </Flag>
        <Flag kind="build" title="Channel glyphs for Email / SMS / In-app">
          Lucide ships in the icon policy and the bundle includes <code>bell</code>, but not mail / message / app-window.
          Those three are drawn inline at the same 1.75 stroke so the channel header row stays consistent.
        </Flag>
        <Flag kind="watch" title="Frequency options normalized to four">
          The source prototype carried per-cell option subsets (a page-builder limit). The brief specifies a single
          set — Instant / Daily / Weekly / Monthly — so every select offers all four, keeping each cell's saved default.
        </Flag>
        <Flag kind="watch" title="Mobile drops the N/A dashes">
          On desktop, unavailable channels render an explicit em-dash so the grid reads as a true matrix. On mobile each
          card lists only its available channels — dead dashes are noise on a phone. Same data, breakpoint-appropriate density.
        </Flag>
        <Flag kind="ok" title="Constraints preserved verbatim">
          SMS column/rows stay disabled until consent. The TCPA box defaults OFF and is never pre-checked. The
          "Consent is not required to use the platform" and reply-STOP language is unchanged. Per SSGNR-20, a toggled-on
          SMS row is saved as target state, not an active send — called out inline.
        </Flag>
        <Flag kind="ok" title="One screen, two breakpoints, shared state">
          Both frames render the same component tree off one state object, so flipping consent or a toggle in either frame
          updates the other — proving the desktop matrix and the mobile reflow are the same product.
        </Flag>
      </div>
    </div>
  );
}

/* -------- root -------- */
function App() {
  const [cells, setCells] = useState(buildInitialState());
  const [consent, setConsent] = useState(false); // TCPA — defaults OFF, never pre-checked
  const [saved, setSaved] = useState(false);

  const setCell = (tid, cid, patch) => {
    setCells(prev => ({ ...prev, [tid]: { ...prev[tid], [cid]: { ...prev[tid][cid], ...patch } } }));
    setSaved(false);
  };
  const onSave = () => { setSaved(true); setTimeout(() => setSaved(false), 1800); };

  const screenProps = { cells, consent, setCell, setConsent: (v) => { setConsent(v); setSaved(false); }, onSave, saved };

  return (
    <div className="pc-page">
      <div className="pc-head">
        <SMark size={30} />
        <div>
          <div style={{ fontFamily: 'var(--ss-font)', fontWeight: 400, fontSize: 20, letterSpacing: '-0.03em', color: 'var(--ss-fg-1)' }}>Preference Center</div>
          <div style={{ fontFamily: 'var(--ss-font)', fontWeight: 300, fontSize: 13, color: 'var(--ss-fg-3)' }}>TSS-1113 · rebuilt on Scrub Society primitives</div>
        </div>
      </div>

      <div className="pc-canvas">
        <div className="pc-col-desktop">
          <div className="frame-label"><span className="ttl">Desktop</span><span className="sub">in-app settings · full matrix</span></div>
          <div className="desktop-surface">
            <div className="desktop-chrome">
              <i style={{ background: '#E0726B' }}></i><i style={{ background: '#E6B95C' }}></i><i style={{ background: '#7FB682' }}></i>
              <span style={{ marginLeft: 12, fontFamily: 'var(--ss-font)', fontWeight: 300, fontSize: 12, color: 'var(--ss-fg-3)' }}>scrubsociety.com/settings/notifications</span>
            </div>
            <div className="desktop-body">
              <PrefScreen variant="desktop" {...screenProps} />
            </div>
          </div>
        </div>

        <div className="pc-col-mobile">
          <div className="frame-label"><span className="ttl">Mobile</span><span className="sub">matrix reflowed to topic cards</span></div>
          <MobileFrame screenProps={screenProps} />
        </div>
      </div>

      <DesignNotes />
    </div>
  );
}

function MobileFrame({ screenProps }) {
  const { IOSDevice } = window;
  const inner = (
    <div style={{ padding: '8px 16px 40px' }}>
      <PrefScreen variant="mobile" {...screenProps} />
    </div>
  );
  if (IOSDevice) {
    return <IOSDevice width={400} height={860} title="Notifications">{inner}</IOSDevice>;
  }
  return <div style={{ width: 400, background: '#fff', borderRadius: 40, boxShadow: '0 30px 70px -30px rgba(66,26,49,0.5)', overflow: 'hidden' }}>{inner}</div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
