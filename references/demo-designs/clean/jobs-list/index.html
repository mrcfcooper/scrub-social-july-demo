  <script type="text/babel" src="src/e163fefd.js"></script>

  <script type="text/babel">
    const FLAGS = [
      {
        t: 'Grid & map views have no primitive',
        b: "The live page offers grid / list / map. The kit only defines a horizontal job-row card, so this rebuilds the list view faithfully. Grid (vertical multi-column cards) and the map view need net-new components — the toggle is shown but only list is backed.",
      },
      {
        t: 'Off-palette status colors',
        b: "Live verified / compact / workflow badges use sky, teal, emerald, amber and rose. Only six brand colors exist and there are no semantic status tokens. Rebuilt verified→Clear Sky chip, compact→Soft Cloud chip; the application-status set (pending/accepted/rejected) needs a palette decision.",
      },
      {
        t: 'Cold grays & a gradient page',
        b: "Live leans on gray-200/300 borders, gray body text, and a from-gray-50 background gradient. Brand hairlines are Plum Grove at 12% and backgrounds are solid blocks (no gradients). Swapped to --ss-line over Soft Cloud.",
      },
      {
        t: 'Title-case headings & a red status dot',
        b: '\u201CYour Next Shift Starts Here\u201D and \u201CActive Filter:\u201D are Title Case; brand headlines are sentence case. The results count is marked with a red dot (red isn\u2019t a brand color) — moved to Lavender Field.',
      },
      {
        t: 'Compare has no primitive',
        b: "The compare-jobs control + count bubble isn't in the kit. Approximated with a ghost control + a Plum Grove count badge; worth promoting to a real primitive if it stays.",
      },
    ];

    function FlagsPanel() {
      return (
        <Card padding={28} style={{ width: 420, maxWidth: '100%' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
            <div style={{ width: 34, height: 34, borderRadius: '10px 10px 10px 0', background: SS.lav, color: SS.plum, display: 'flex', alignItems: 'center', justifyContent: 'center', flex: '0 0 auto' }}>
              <Icon name="sliders" size={18} />
            </div>
            <H3 style={{ fontSize: 18 }}>What fights the primitives</H3>
          </div>
          <Body size={13} style={{ color: SS.fg2, marginBottom: 6 }}>
            Five spots where the live layout reaches past the clean system — flagged, not silently corrected.
          </Body>
          <div style={{ display: 'flex', flexDirection: 'column' }}>
            {FLAGS.map((f, i) => (
              <div key={i} style={{ padding: '14px 0', borderTop: `1px solid ${SS.lineSoft}` }}>
                <div style={{ display: 'flex', gap: 10, alignItems: 'baseline' }}>
                  <span style={{ fontFamily: SS.font, fontWeight: 400, fontSize: 13, color: SS.lav, lineHeight: 1.4, flex: '0 0 auto' }}>{String(i + 1).padStart(2, '0')}</span>
                  <div>
                    <div style={{ fontFamily: SS.font, fontWeight: 400, fontSize: 15, letterSpacing: '-0.01em', color: SS.plum }}>{f.t}</div>
                    <Body size={13} style={{ color: SS.fg2, marginTop: 3 }}>{f.b}</Body>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </Card>
      );
    }

    function Page() {
      return (
        <div className="wrap">
          <div className="page-head">
            <h1 className="page-title">Jobs list, rebuilt on clean primitives</h1>
            <p className="page-sub">The live Jobs list — controls, active filters, results bar, and feed — recomposed for web and the mobile app using only Scrub Society components and tokens.</p>
          </div>

          <div className="section">
            <p className="frame-label"><span className="dot"></span>Web · desktop · list view</p>
            <div className="desktop-frame">
              <ChromeWindow width={1180} height={880} url="scrubsociety.com/jobs"
                tabs={[{ title: 'Jobs · Scrub Society' }, { title: 'Erin' }]} activeIndex={0}>
                <WebJobsList />
              </ChromeWindow>
            </div>
          </div>

          <div className="section">
            <div className="row">
              <div>
                <p className="frame-label"><span className="dot"></span>Mobile app · iOS</p>
                <MobileJobsApp />
              </div>
              <div style={{ flex: 1, minWidth: 360 }}>
                <p className="frame-label"><span className="dot"></span>Notes</p>
                <FlagsPanel />
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
  </script>
