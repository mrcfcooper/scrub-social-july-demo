<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scrub Society — Mobile Home</title>
<style>/* ============================================================
   Scrub Society — Design Tokens
   Source of truth: ScrubSociety_BrandStandards.pdf (Spring 2026)
   Usage: import once in your HTML/CSS root.
   ============================================================ */

@font-face {
  font-family: "Outfit";
  src: url("/demo/assets/home-mobile-8e5fa91f.bin") format("truetype-variations"),
       url("/demo/assets/home-mobile-8e5fa91f.bin") format("truetype");
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}

:root {
  /* ---------------- BRAND COLOR — primary palette ---------------- */
  /* Plum Grove — dominant background and hero color (40% of color use). */
  --ss-plum-grove: #421A31;
  /* Open Air — paper white (20% of color use). */
  --ss-open-air: #FFFFFF;
  /* Lavender Field — accent (15% of color use). */
  --ss-lavender-field: #BBAFEF;

  /* ---------------- BRAND COLOR — secondary palette ---------------- */
  /* Backgrounds and buttons only. Never combined with Open Air in duotone — Soft Cloud + Open Air are the ONLY duotone pair. */
  --ss-clear-sky:    #82ABF4;
  --ss-morning-dew:  #CEDBFE;
  --ss-soft-cloud:   #F9F2E8;

  /* ---------------- DERIVED color states ---------------- */
  /* All derived states use color-mix on the canonical brand values; no new hues invented. */
  --ss-plum-grove-90: color-mix(in srgb, var(--ss-plum-grove) 90%, black);   /* press */
  --ss-plum-grove-80: color-mix(in srgb, var(--ss-plum-grove) 80%, white);   /* hover-on-light surface */
  --ss-plum-grove-60: color-mix(in srgb, var(--ss-plum-grove) 60%, white);
  --ss-plum-grove-40: color-mix(in srgb, var(--ss-plum-grove) 40%, white);
  --ss-plum-grove-20: color-mix(in srgb, var(--ss-plum-grove) 20%, white);   /* hairline tint */
  --ss-plum-grove-08: color-mix(in srgb, var(--ss-plum-grove) 8%,  white);   /* faintest fill */

  --ss-lavender-field-60: color-mix(in srgb, var(--ss-lavender-field) 60%, white);
  --ss-lavender-field-30: color-mix(in srgb, var(--ss-lavender-field) 30%, white);
  --ss-clear-sky-30:      color-mix(in srgb, var(--ss-clear-sky)      30%, white);
  --ss-morning-dew-50:    color-mix(in srgb, var(--ss-morning-dew)    50%, white);

  /* ---------------- SEMANTIC color tokens ---------------- */
  /* Surfaces */
  --ss-bg-page:     var(--ss-open-air);
  --ss-bg-canvas:   var(--ss-soft-cloud);       /* warm paper, sparing — 5% */
  --ss-bg-hero:     var(--ss-plum-grove);       /* dominant dark hero */
  --ss-bg-card:     var(--ss-open-air);
  --ss-bg-card-alt: var(--ss-soft-cloud);
  --ss-bg-tint:     var(--ss-morning-dew);      /* soft secondary fill */
  --ss-bg-accent:   var(--ss-lavender-field);   /* accent fill */
  --ss-bg-info:     var(--ss-clear-sky);

  /* Text — on light */
  --ss-fg-1: var(--ss-plum-grove);                              /* primary body + heading */
  --ss-fg-2: color-mix(in srgb, var(--ss-plum-grove) 72%, var(--ss-open-air));  /* muted */
  --ss-fg-3: color-mix(in srgb, var(--ss-plum-grove) 50%, var(--ss-open-air));  /* very muted, captions */
  --ss-fg-on-dark:        var(--ss-open-air);
  --ss-fg-on-dark-muted:  color-mix(in srgb, var(--ss-open-air) 75%, var(--ss-plum-grove));

  /* Lines & dividers */
  --ss-line:       color-mix(in srgb, var(--ss-plum-grove) 12%, var(--ss-open-air));
  --ss-line-soft:  color-mix(in srgb, var(--ss-plum-grove)  8%, var(--ss-open-air));
  --ss-line-on-dark: color-mix(in srgb, var(--ss-open-air) 18%, transparent);

  /* Interaction */
  --ss-focus-ring: color-mix(in srgb, var(--ss-lavender-field) 60%, transparent);

  /* ---------------- TYPOGRAPHY — family + weights ---------------- */
  /* Only one typeface, two weights. */
  --ss-font: "Outfit", "Helvetica Neue", Arial, sans-serif;
  --ss-weight-light:   300;   /* body copy */
  --ss-weight-regular: 400;   /* headlines, subheads, subtext */

  /* ---------------- TYPOGRAPHY — scale ---------------- */
  /* Mobile-first sizes; the type roles below define the role-to-step mapping. */
  --ss-step-1:  0.75rem;    /* 12 */
  --ss-step-2:  0.875rem;   /* 14 */
  --ss-step-3:  1rem;       /* 16 */
  --ss-step-4:  1.125rem;   /* 18 */
  --ss-step-5:  1.375rem;   /* 22 */
  --ss-step-6:  1.75rem;    /* 28 */
  --ss-step-7:  2.25rem;    /* 36 */
  --ss-step-8:  3rem;       /* 48 */
  --ss-step-9:  4rem;       /* 64 */
  --ss-step-10: 5.5rem;     /* 88 — hero display */

  /* ---------------- SPACING ---------------- */
  --ss-space-1:  4px;
  --ss-space-2:  8px;
  --ss-space-3:  12px;
  --ss-space-4:  16px;
  --ss-space-5:  24px;
  --ss-space-6:  32px;
  --ss-space-7:  48px;
  --ss-space-8:  64px;
  --ss-space-9:  96px;
  --ss-space-10: 128px;

  /* ---------------- RADII ---------------- */
  /* Speech-bubble inspired: pill + photo-frame asymmetric pill (square bottom-left). */
  --ss-radius-1:  6px;
  --ss-radius-2:  12px;     /* default card */
  --ss-radius-3:  20px;     /* large card */
  --ss-radius-4:  32px;     /* hero element */
  --ss-radius-pill:    9999px;
  --ss-radius-photo:   28px 28px 28px 0;   /* speech-bubble photo frame */
  --ss-radius-bubble:  9999px 9999px 9999px 0; /* full bubble — used for the S mark + chat tails */

  /* ---------------- SHADOWS ---------------- */
  /* Subtle; the brand is paper-flat, not glossy. */
  --ss-shadow-1: 0 1px 2px color-mix(in srgb, var(--ss-plum-grove) 12%, transparent);
  --ss-shadow-2: 0 6px 16px -8px color-mix(in srgb, var(--ss-plum-grove) 22%, transparent);
  --ss-shadow-3: 0 18px 36px -16px color-mix(in srgb, var(--ss-plum-grove) 28%, transparent);
  --ss-shadow-inset-hairline: inset 0 0 0 1px var(--ss-line);

  /* ---------------- MOTION ---------------- */
  --ss-ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
  --ss-ease-out:      cubic-bezier(0, 0, 0.2, 1);
  --ss-dur-fast: 120ms;
  --ss-dur-base: 220ms;
  --ss-dur-slow: 400ms;
}

/* ---------------- ROLE-TO-STYLE — these are the canonical type roles. ----------------
   Per brand standards (page 29):
   - HEADLINE:  Outfit Regular,  tracking -40pt (≈ -0.04em), sentence case
   - SUBHEAD:   Outfit Regular,  tracking  0pt,  ALL CAPS
   - BODY COPY: Outfit Light,    tracking  0pt,  sentence case
   - SUBTEXT:   Outfit Regular,  tracking  0pt,  lower case
*/
.ss-headline,
.ss-h1, .ss-h2, .ss-h3, .ss-h4 {
  font-family: var(--ss-font);
  font-weight: var(--ss-weight-regular);
  letter-spacing: -0.04em;        /* -40pt tracking */
  line-height: 1.04;
  text-transform: none;           /* sentence case */
  text-wrap: balance;
  color: var(--ss-fg-1);
  margin: 0;
}
.ss-h1 { font-size: clamp(2.5rem, 6vw + 0.5rem, var(--ss-step-10)); }
.ss-h2 { font-size: clamp(2rem,   4vw + 0.5rem, var(--ss-step-8));  }
.ss-h3 { font-size: clamp(1.5rem, 2.5vw + 0.5rem, var(--ss-step-7)); }
.ss-h4 { font-size: clamp(1.25rem, 1.5vw + 0.5rem, var(--ss-step-6)); line-height: 1.15; }

.ss-subhead {
  font-family: var(--ss-font);
  font-weight: var(--ss-weight-regular);
  letter-spacing: 0.08em;
  line-height: 1.2;
  text-transform: uppercase;
  font-size: var(--ss-step-2);
  color: var(--ss-fg-2);
  margin: 0;
}

.ss-body, p.ss-body {
  font-family: var(--ss-font);
  font-weight: var(--ss-weight-light);    /* light = the body weight */
  letter-spacing: 0;
  line-height: 1.55;
  font-size: var(--ss-step-3);
  color: var(--ss-fg-1);
  text-wrap: pretty;
  margin: 0;
}
.ss-body-sm { font-size: var(--ss-step-2); line-height: 1.5; }
.ss-body-lg { font-size: var(--ss-step-4); line-height: 1.55; }

.ss-subtext {
  font-family: var(--ss-font);
  font-weight: var(--ss-weight-regular);
  letter-spacing: 0;
  line-height: 1.4;
  text-transform: lowercase;              /* lower case per spec */
  font-size: var(--ss-step-2);
  color: var(--ss-fg-2);
  margin: 0;
}

/* On-dark variants */
.ss-on-dark { color: var(--ss-fg-on-dark); }
.ss-on-dark .ss-body, .ss-on-dark .ss-headline,
.ss-on-dark .ss-h1, .ss-on-dark .ss-h2, .ss-on-dark .ss-h3, .ss-on-dark .ss-h4 { color: var(--ss-fg-on-dark); }
.ss-on-dark .ss-subhead, .ss-on-dark .ss-subtext { color: var(--ss-fg-on-dark-muted); }

/* Reset helpers */
html, body { background: var(--ss-bg-page); color: var(--ss-fg-1); font-family: var(--ss-font); }
*, *::before, *::after { box-sizing: border-box; }
</style>
<style>
  html, body { margin: 0; padding: 0; background: #ece4da; min-height: 100vh; }
  body {
    font-family: var(--ss-font);
    display: flex; gap: 40px; padding: 48px 32px;
    flex-wrap: wrap; justify-content: center; align-items: flex-start;
  }
  .stack { display: flex; flex-direction: column; align-items: center; }
  .stack .label {
    font-family: var(--ss-font); font-weight: 400; font-size: 12px;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--ss-fg-2);
    margin-top: 16px;
  }

  /* IA proposal panel */
  .ia {
    width: 360px; max-width: 100%;
    background: #fff; border-radius: 24px; padding: 28px;
    box-shadow: 0 20px 50px -24px rgba(66,26,49,0.35), inset 0 0 0 1px rgba(66,26,49,0.10);
    align-self: flex-start; margin-top: 4px;
  }
  .ia h2 {
    margin: 0; font-family: var(--ss-font); font-weight: 400; letter-spacing: -0.04em;
    font-size: 22px; line-height: 1.1; color: var(--ss-plum-grove);
  }
  .ia .sub {
    font-family: var(--ss-font); font-weight: 300; font-size: 13.5px; line-height: 1.5;
    color: var(--ss-fg-2); margin: 8px 0 0;
  }
  .ia ul { list-style: none; margin: 22px 0 0; padding: 0; display: flex; flex-direction: column; gap: 2px; }
  .ia li { display: flex; gap: 14px; padding: 14px 0; border-top: 1px solid rgba(66,26,49,0.10); }
  .ia li:first-child { border-top: 0; }
  .ia .tab {
    flex: 0 0 auto; width: 64px;
    font-family: var(--ss-font); font-weight: 400; font-size: 11px; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--ss-plum-grove);
    padding-top: 2px;
  }
  .ia .what { font-family: var(--ss-font); }
  .ia .what b { font-weight: 400; font-size: 14px; color: var(--ss-plum-grove); letter-spacing: -0.01em; }
  .ia .what p { margin: 3px 0 0; font-weight: 300; font-size: 13px; line-height: 1.45; color: var(--ss-fg-2); }
  .ia .what em {
    font-style: normal; font-weight: 400; font-size: 11px; text-transform: lowercase;
    color: var(--ss-fg-3); display: block; margin-top: 4px;
  }

  .col { display: flex; flex-direction: column; gap: 24px; width: 360px; max-width: 100%; }
  .col .ia { width: auto; }

  /* Web-vs-app note card (dark, to separate from the IA panel) */
  .wva {
    background: var(--ss-plum-grove); border-radius: 24px; padding: 28px;
    box-shadow: 0 20px 50px -24px rgba(66,26,49,0.45);
  }
  .wva h2 {
    margin: 0; font-family: var(--ss-font); font-weight: 400; letter-spacing: -0.04em;
    font-size: 22px; line-height: 1.1; color: var(--ss-open-air);
  }
  .wva .sub {
    font-family: var(--ss-font); font-weight: 300; font-size: 13.5px; line-height: 1.5;
    color: rgba(255,255,255,0.66); margin: 8px 0 0;
  }
  .wva ul { list-style: none; margin: 20px 0 0; padding: 0; display: flex; flex-direction: column; gap: 0; }
  .wva li { padding: 13px 0; border-top: 1px solid rgba(255,255,255,0.14); }
  .wva li:first-child { border-top: 0; }
  .wva .k {
    font-family: var(--ss-font); font-weight: 400; font-size: 11px; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--ss-lavender-field); margin-bottom: 7px;
  }
  .wva .pair { display: flex; gap: 12px; }
  .wva .pair > div { flex: 1; }
  .wva .tagline {
    font-family: var(--ss-font); font-weight: 400; font-size: 11px; color: rgba(255,255,255,0.5);
    display: flex; align-items: center; gap: 5px; margin-bottom: 3px;
  }
  .wva .dot { width: 6px; height: 6px; border-radius: 9999px; flex: 0 0 auto; }
  .wva p {
    margin: 0; font-family: var(--ss-font); font-weight: 300; font-size: 12.5px; line-height: 1.45;
    color: rgba(255,255,255,0.82);
  }
  .wva code {
    font-family: var(--ss-font); font-weight: 400; font-size: 11.5px;
    color: var(--ss-morning-dew); background: rgba(255,255,255,0.08);
    padding: 1px 5px; border-radius: 5px;
  }
</style>
</head>

  <script src="src/65293a6d.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="vendor/369cbaea.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="vendor/8b9b791b.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  

  <div id="root"></div>

  <script type="text/babel" src="src/8ee993ee.jsx"></script>
  <script type="text/babel" src="src/750056b1.js"></script>
  <script type="text/babel" src="src/e3fd403c.js"></script>
  <script type="text/babel" src="src/9e6bc937.js"></script>

  <script type="text/babel">
    function MobileApp() {
      const [tab, setTab] = React.useState('home');
      const [openJob, setOpenJob] = React.useState(null);
      const go = (t) => { setOpenJob(null); setTab(t); };

      let screen;
      if (openJob)                 screen = <JobDetailScreen job={openJob} onBack={() => setOpenJob(null)} onApply={() => setOpenJob(null)} />;
      else if (tab === 'home')     screen = <HomeLaunchpad onOpenJob={setOpenJob} onGo={go} />;
      else if (tab === 'jobs')     screen = <JobsScreen onOpenJob={setOpenJob} />;
      else if (tab === 'erin')     screen = <ErinScreen onBack={() => go('home')} />;
      else if (tab === 'society')  screen = <SocietyScreen />;
      else if (tab === 'profile')  screen = <ProfileScreen />;

      // per-screen top app bar (Erin/JobDetail bring their own header)
      const headers = {
        home: (
          <div style={{ padding: '4px 16px 14px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <SMark size={24} />
              <span style={{ fontFamily: SS.font, fontWeight: 400, fontSize: 18, letterSpacing: '-0.02em', color: SS.plum }}>Scrub Society</span>
            </div>
            <IconButton name="bell" />
          </div>
        ),
        jobs: (
          <div style={{ padding: '4px 16px 12px' }}>
            <H2 style={{ fontSize: 24 }}>Find your next move</H2>
            <Subtext>more routes. less roulette.</Subtext>
          </div>
        ),
        society: null,
        profile: (
          <div style={{ padding: '4px 16px 12px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <H2 style={{ fontSize: 22 }}>Profile</H2>
            <IconButton name="settings" />
          </div>
        ),
      };

      const showHeader = !openJob && headers[tab] !== undefined && tab !== 'erin';

      return (
        <IOSDevice keyboard={false}>
          <div style={{ background: SS.cloud, minHeight: '100%', position: 'relative', display: 'flex', flexDirection: 'column', paddingTop: 54 }}>
            {showHeader ? headers[tab] : null}
            <div style={{ flex: 1, overflowY: 'auto', position: 'relative' }}>{screen}</div>
            {!openJob && <TabBar active={tab} onChange={go} />}
          </div>
        </IOSDevice>
      );
    }

    function IAProposal() {
      const rows = [
        { tab: 'Home', t: 'Launchpad only', p: 'Greeting + ask, quick actions, a featured-jobs peek, one Erin nudge, one Society event. Everything else is a doorway.', e: 'fits in a few scrolls' },
        { tab: 'Jobs', t: 'Full job feed + employer logos', p: 'Search, filters, every matching assignment. The “trusted partners” logo strip lives here as a verified-agencies row.', e: 'from “see all jobs”' },
        { tab: 'Erin', t: 'AI assistant, full thread', p: 'The home teaser opens the conversation here — search, housing, licensing, and pay questions all resolve in chat.', e: 'from the ask bar + teaser' },
        { tab: 'Society', t: 'Events · Social Club · Blog', p: 'The complete Events calendar, Social Club feed, and editorial blog become topic tabs on the community wall.', e: 'from the event teaser' },
        { tab: 'Profile', t: 'Credentials & resources', p: 'Compact license, housing prefs, CE credits and discounts settle into the member’s account + resources hub.', e: 'from quick actions' },
      ];
      return (
        <div className="ia">
          <h2>Where the pushed-off sections live</h2>
          <p className="sub">Home stays a launchpad. The long web page’s sections relocate to their natural tab destinations — each reachable from a home entry point.</p>
          <ul>
            {rows.map(r => (
              <li key={r.tab}>
                <div className="tab">{r.tab}</div>
                <div className="what">
                  <b>{r.t}</b>
                  <p>{r.p}</p>
                  <em>{r.e}</em>
                </div>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function WebVsApp() {
      const rows = [
        {
          k: 'The sticky bar itself',
          app: 'Sits above the iOS home indicator / Android nav bar — pad with env(safe-area-inset-bottom) and set viewport-fit=cover.',
          web: 'Mobile Safari/Chrome float their own bottom toolbar over a fixed bar. Use 100dvh (not 100vh) + the same safe-area inset so it never hides or jumps as the URL bar collapses.',
        },
        {
          k: 'Status bar / top',
          app: 'Owns the status bar — set its color & light/dark style via the Capacitor StatusBar plugin; can run edge-to-edge under the notch.',
          web: 'Inherits browser chrome. Only the theme-color meta tints it; no edge-to-edge control.',
        },
        {
          k: 'Navigation & back',
          app: 'Handles the Android hardware back button and iOS edge-swipe; each tab keeps its own stack.',
          web: 'Leans on browser history — tabs and detail views should map to real URLs so back works and links are shareable.',
        },
        {
          k: 'Scroll behaviour',
          app: 'Body is locked; only the screen region scrolls. Kill rubber-band overscroll so the bar stays planted.',
          web: 'The whole document rubber-bands — set overscroll-behavior: none and keep a solid backdrop so the page doesn’t peek past the bar.',
        },
        {
          k: 'Launch context',
          app: 'Installed, opens standalone, assets bundled for offline.',
          web: 'A browser tab by default. “Add to Home Screen” (PWA) brings it closer to the app — standalone display + safe-area insets kick in.',
        },
      ];
      return (
        <div className="wva">
          <h2>Mobile web vs. mobile app</h2>
          <p className="sub">Same launchpad, same components. These are the only places the Capacitor app and the mobile-web build need to behave differently — most of them touch that sticky bottom bar.</p>
          <ul>
            {rows.map(r => (
              <li key={r.k}>
                <div className="k">{r.k}</div>
                <div className="pair">
                  <div>
                    <div className="tagline"><span className="dot" style={{ background: 'var(--ss-lavender-field)' }}></span>App (Capacitor)</div>
                    <p>{r.app}</p>
                  </div>
                  <div>
                    <div className="tagline"><span className="dot" style={{ background: 'var(--ss-clear-sky)' }}></span>Mobile web</div>
                    <p>{r.web}</p>
                  </div>
                </div>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function App() {
      return (
        <>
          <div className="stack">
            <MobileApp />
            <div className="label">Home — focused launchpad · bottom bar sticky</div>
          </div>
          <div className="col">
            <IAProposal />
            <WebVsApp />
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>


</body></html>
